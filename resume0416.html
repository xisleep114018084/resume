<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歐佳穎｜個人履歷</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
    color: white;
    overflow-x: hidden;
}

/* 背景光暈 */
body::before {
    content: "";
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, #7f5af0, transparent);
    top: -200px;
    left: -200px;
    filter: blur(120px);
}

/* 主卡片 */
.container {
    max-width: 900px;
    margin: 50px auto;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.08);
    border-radius: 25px;
    padding: 30px;
    box-shadow: 0 0 40px rgba(0,0,0,0.4);
    animation: fadeUp 1s ease;
}

/* 頭像 */
.profile {
    text-align: center;
}

.profile img {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: 4px solid white;
    object-fit: cover;
    transition: 0.3s;
}

.profile img:hover {
    transform: scale(1.1);
}

.name {
    font-size: 32px;
    margin-top: 15px;
    font-weight: bold;
}

.subtitle {
    opacity: 0.8;
}

/* 區塊 */
.section {
    margin-top: 30px;
}

.section h2 {
    border-left: 5px solid #7f5af0;
    padding-left: 10px;
    margin-bottom: 15px;
}

/* 技能條 */
.skill {
    margin: 10px 0;
}

.bar {
    height: 8px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    overflow: hidden;
}

.fill {
    height: 100%;
    width: 0;
    background: linear-gradient(90deg, #7f5af0, #00c6ff);
    transition: 1.5s;
}

/* 音樂按鈕 */
.music-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #7f5af0;
    border: none;
    color: white;
    padding: 15px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

/* 動畫 */
@keyframes fadeUp {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">

    <div class="profile">
        <img src="profile.webp">
        <div class="name">歐佳穎</div>
        <div class="subtitle">亞洲大學 學生</div>
    </div>

    <div class="section">
        <h2>基本資料</h2>
        學號：AU114018184<br>
        Email：xia@gmail.com<br>
        電話：09xx-xxx-xxx
    </div>

    <div class="section">
        <h2>自我介紹</h2>
        我是一名對設計與科技充滿熱情的學生，擅長將創意與技術結合，
        持續精進前端開發與專案實作能力，具備良好的團隊合作與溝通能力。
    </div>

    <div class="section">
        <h2>技能</h2>

        <div class="skill">
            HTML
            <div class="bar"><div class="fill" data="90%"></div></div>
        </div>

        <div class="skill">
            CSS
            <div class="bar"><div class="fill" data="85%"></div></div>
        </div>

        <div class="skill">
            JavaScript
            <div class="bar"><div class="fill" data="75%"></div></div>
        </div>

    </div>

    <div class="section">
        <h2>經歷</h2>
        ・校內專題開發<br>
        ・活動企劃與執行<br>
        ・團隊專案合作
    </div>

</div>

<!-- 音樂 -->
<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<script>
// 技能動畫
window.addEventListener("load", () => {
    document.querySelectorAll(".fill").forEach(el => {
        el.style.width = el.getAttribute("data");
    });
});

// 音樂控制（修正 AbortError）
let playing = false;
const music = document.getElementById("music");

function toggleMusic() {
    if (!playing) {
        music.play().catch(err => console.log(err));
        playing = true;
    } else {
        music.pause();
        playing = false;
    }
}
</script>

</body>
</html>
